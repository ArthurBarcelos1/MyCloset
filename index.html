<!DOCTYPE html>
<html lang="pt-BR">

        </div>

    </main>

    <nav class="bottom-bar">
        <a href="index.html"><button>
            <i class="fa-solid fa-user"></i>
        </button></a>

        <a href="catalogo.html"><button>
            <i class="fa-solid fa-shirt"></i>
        </button></a>
