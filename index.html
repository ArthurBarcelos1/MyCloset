<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MyCloset - Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="theme-color" content="#f7b8df">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MyCloset">

    <link rel="icon" type="image/png" href="icons/MainIcon.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="login-page">

<div class="background"></div>

<div class="login">

    <img src="icons/MainIcon.png" class="logo">

    <h1>MyCloset</h1>

    <p class="subtitle">
        Entre para acessar sua conta.
    </p>

    <div class="field">

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="Digite seu email">

    </div>

    <div class="field">

        <label>Senha</label>

        <input
            type="password"
            id="password"
            placeholder="Digite sua senha">

    </div>

    <button id="loginButton">
        Entrar
    </button>

    <p id="error"></p>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/functions.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
